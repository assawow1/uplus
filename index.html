<html lang="ko">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>U+One 체험 가이드</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
      background: #f9fafb;
      color: #333;
      font-size: 14px;
    }
    html, body, #wrapper {
      height: 100%;
      width: 100%;
    }
    button {
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: inherit;
    }
    #wrapper {
      max-width: 100%;
      min-height: 100%;
      background: #fff;
      overflow-y: auto;
    }
    #header {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 16px;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }
    #title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .logo {
      color: #E6007E;
      font-weight: 900;
      font-size: 20px;
    }
    .title-text {
      font-weight: 700;
      font-size: 18px;
    }
    .source-text {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
      font-weight: 400;
    }
    #controls {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn-control {
      background: #f1f3f5;
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 12px;
      color: #555;
      transition: all 0.2s;
    }
    .btn-control:hover {
      background: #e9ecef;
    }
    #search-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #f8f9fa;
      box-sizing: border-box;
      font-size: 18px;
      transition: border-color 0.2s;
    }
    #search-input:focus {
      outline: none;
      border-color: #E6007E;
      background: #fff;
    }
    #list-container {
      padding: 12px;
    }
    .section {
      margin-bottom: 12px;
      border: 1px solid #eee;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .section-header {
      background: linear-gradient(135deg, #E6007E, #FF6B9D);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
    }
    .section-header:hover {
      background: linear-gradient(135deg, #d1006f, #ff5a8d);
    }
    .section-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .section-body.open {
      max-height: 5000px;
    }
    .question {
      border-bottom: 1px solid #f5f5f5;
    }
    .question:last-child {
      border-bottom: none;
    }
    .question-header {
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .question-header:hover {
      background: #fff0f6;
    }
    .question-title {
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .question-title .q-mark {
      color: #E6007E;
      font-weight: 700;
    }
    .question-icon {
      font-size: 10px;
      color: #999;
      transition: transform 0.2s;
    }
    .question-body {
      max-height: 0;
      overflow: hidden;
      background: #fafafa;
      padding: 0 16px;
      transition: all 0.2s ease;
    }
    .question-body.open {
      max-height: 120px;
      padding: 14px 16px;
    }
    .action-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .btn {
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 12px;
      color: #fff;
      background: #E6007E;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #d1006f;
      transform: translateY(-1px);
    }
    .btn-gray {
      background: #6c757d;
      color: #fff;
    }
    .btn-gray:hover {
      background: #5a6268;
    }
    .preparing {
      color: #999;
      font-size: 12px;
      font-style: italic;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .hidden {
      display: none !important;
    }
    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    .no-results-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    #install-section {
      margin: 20px 12px;
      padding: 20px;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      border-radius: 12px;
      border: 2px dashed #dee2e6;
      text-align: center;
    }
    #install-section h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      color: #333;
    }
    #install-section p {
      margin: 0 0 16px 0;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    .install-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-install {
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-install.ios {
      background: linear-gradient(135deg, #007AFF, #0051D5);
    }
    .btn-install.ios:hover {
      background: linear-gradient(135deg, #0051D5, #003DA5);
      transform: translateY(-2px);
    }
    .btn-install.android {
      background: linear-gradient(135deg, #34A853, #0F9D58);
    }
    .btn-install.android:hover {
      background: linear-gradient(135deg, #0F9D58, #0D8C4F);
      transform: translateY(-2px);
    }
    .install-icon {
      font-size: 18px;
    }
    #install-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    #install-modal.show {
      display: flex;
    }
    .modal-content {
      background: #fff;
      border-radius: 16px;
      max-width: 400px;
      width: 100%;
      max-height: 80%;
      overflow-y: auto;
      position: relative;
    }
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h3 {
      margin: 0;
      font-size: 18px;
      color: #333;
    }
    .modal-close {
      background: #f1f3f5;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }
    .modal-close:hover {
      background: #e9ecef;
      color: #333;
    }
    .modal-body {
      padding: 20px;
    }
    .install-step {
      margin-bottom: 20px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #E6007E;
    }
    .install-step:last-child {
      margin-bottom: 0;
    }
    .step-number {
      display: inline-block;
      width: 24px;
      height: 24px;
      background: #E6007E;
      color: #fff;
      border-radius: 50%;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      font-weight: 700;
      margin-right: 8px;
    }
    .step-title {
      font-weight: 600;
      font-size: 14px;
      color: #333;
      margin-bottom: 8px;
    }
    .step-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.6;
      margin-left: 32px;
    }
    .step-icon {
      font-size: 20px;
      margin: 0 4px;
    }
  </style>

    function initializeList() {
      const container = document.getElementById('list-container');
      let html = '';

      data.forEach((section, sIndex) => {
        let questionsHtml = '';
        section.items.forEach((item, qIndex) => {
          const hasVideo = item[1] && item[1].length > 0;
          const buttons = hasVideo
            ? `<a href="https://youtu.be/${item[1]}" target="_blank" rel="noopener noreferrer" class="btn">▶ 보기</a>
               <button onclick="copyLink('${item[1]}')" class="btn btn-gray">🔗 공유</button>`
            : `<span class="preparing">준비중</span>`;

          questionsHtml += `
            <div class="question" data-search="${item[0].toLowerCase()}">
              <div class="question-header" onclick="toggleQuestion(this)">
                <div class="question-title">
                  <span class="q-mark">Q.</span>
                  <span>${item[0]}</span>
                </div>
                <span class="question-icon">▼</span>
              </div>
              <div class="question-body">
                <div class="action-buttons">${buttons}</div>
              </div>
            </div>
          `;
        });

        html += `
          <div class="section" data-search="${section.title.toLowerCase()}">
            <div class="section-header" onclick="toggleSection(this)">
              <span>${section.title}</span>
              <span style="font-size: 12px;">▼</span>
            </div>
            <div class="section-body">${questionsHtml}</div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    function toggleSection(header) {
      const body = header.nextElementSibling;
      const isOpen = body.classList.contains('open');
      
      document.querySelectorAll('.section-body.open').forEach(openBody => {
        if (openBody !== body) {
          openBody.classList.remove('open');
          openBody.previousElementSibling.lastElementChild.textContent = '▼';
        }
      });
      
      body.classList.toggle('open');
      header.lastElementChild.textContent = isOpen ? '▼' : '▲';
    }

    function toggleQuestion(header) {
      const body = header.nextElementSibling;
      const icon = header.querySelector('.question-icon');
      const isOpen = body.classList.contains('open');

      const section = header.closest('.section-body');
      section.querySelectorAll('.question-body.open').forEach(openBody => {
        if (openBody !== body) {
          openBody.classList.remove('open');
          openBody.previousElementSibling.querySelector('.question-icon').textContent = '▼';
        }
      });

      body.classList.toggle('open');
      icon.textContent = isOpen ? '▼' : '▲';
    }

    function toggleAll(open) {
      document.querySelectorAll('.section-body').forEach(body => {
        if (open) {
          body.classList.add('open');
          body.previousElementSibling.lastElementChild.textContent = '▲';
        } else {
          body.classList.remove('open');
          body.previousElementSibling.lastElementChild.textContent = '▼';
        }
      });

      if (!open) {
        document.querySelectorAll('.question-body').forEach(body => {
          body.classList.remove('open');
          body.previousElementSibling.querySelector('.question-icon').textContent = '▼';
        });
      }
    }

    function filterContent() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const sections = document.querySelectorAll('.section');
      let hasResults = false;

      sections.forEach(section => {
        const questions = section.querySelectorAll('.question');
        let sectionHasMatch = false;

        questions.forEach(question => {
          const searchText = question.dataset.search;
          const matches = query === '' || searchText.includes(query);
          question.style.display = matches ? '' : 'none';
          if (matches) sectionHasMatch = true;
        });

        const sectionTitle = section.dataset.search;
        const titleMatches = query === '' || sectionTitle.includes(query);

        if (titleMatches || sectionHasMatch) {
          section.style.display = '';
          hasResults = true;
          if (query !== '' && sectionHasMatch) {
            section.querySelector('.section-body').classList.add('open');
            section.querySelector('.section-header').lastElementChild.textContent = '▲';
          }
        } else {
          section.style.display = 'none';
        }
      });

      document.getElementById('no-results').classList.toggle('hidden', hasResults || query === '');
    }

    function copyLink(videoId) {
      const url = `https://youtu.be/${videoId}`;
      navigator.clipboard.writeText(url).then(() => {
        showToast('링크가 복사되었습니다');
      }).catch(() => {
        showToast('복사에 실패했습니다');
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    function showInstallGuide(platform) {
      const modal = document.getElementById('install-modal');
      const modalTitle = document.getElementById('modal-title');
      const modalBody = document.getElementById('modal-body');
      
      if (platform === 'ios') {
        modalTitle.textContent = '🍎 iPhone 홈 화면에 추가';
        modalBody.innerHTML = `
          <div class="install-step">
            <div class="step-title">
              <span class="step-number">1</span>
              Safari 브라우저 열기
            </div>
            <div class="step-desc">
              iPhone에서 <strong>Safari 브라우저</strong>로 이 페이지를 열어주세요.<br>
              (Chrome이나 다른 브라우저에서는 홈 화면 추가가 지원되지 않습니다)
            </div>
          </div>
          
          <div class="install-step">
            <div class="step-title">
              <span class="step-number">2</span>

    function closeInstallGuide() {
      const modal = document.getElementById('install-modal');
      modal.classList.remove('show');
    }

    document.getElementById('install-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeInstallGuide();
      }
    });

    async function onConfigChange(config) {
      const c = { ...defaultConfig, ...config };

      document.getElementById('app-title').textContent = c.app_title;
      document.getElementById('search-input').placeholder = c.search_placeholder;

      document.body.style.background = c.surface_color;
      document.getElementById('wrapper').style.background = c.background_color;

      document.querySelectorAll('.section-header').forEach(el => {
        el.style.background = `linear-gradient(135deg, ${c.primary_color}, ${c.secondary_color})`;
      });

      document.querySelectorAll('.q-mark').forEach(el => {
        el.style.color = c.primary_color;
      });

      document.querySelectorAll('.btn:not(.btn-gray)').forEach(el => {
        el.style.background = c.primary_color;
      });

      document.querySelectorAll('.logo').forEach(el => {
        el.style.color = c.primary_color;
      });
    }

    function mapToCapabilities(config) {
      const c = { ...defaultConfig, ...config };
      return {
        recolorables: [
          {
            get: () => c.background_color,
            set: (v) => { c.background_color = v; window.elementSdk.setConfig({ background_color: v }); }
          },
          {
            get: () => c.surface_color,
            set: (v) => { c.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); }
          },
          {
            get: () => c.text_color,
            set: (v) => { c.text_color = v; window.elementSdk.setConfig({ text_color: v }); }
          },
          {
            get: () => c.primary_color,
            set: (v) => { c.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); }
          },
          {
            get: () => c.secondary_color,
            set: (v) => { c.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      const c = { ...defaultConfig, ...config };
      return new Map([
        ['app_title', c.app_title],
        ['search_placeholder', c.search_placeholder]
      ]);
    }

    initializeList();

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
